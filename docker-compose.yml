# ╔════════════════════════════════════════════════════════════════════╗
# ║    SINGHA SODA VISION BOX - Docker Compose Configuration            ║
# ║                                                                      ║
# ║    Services:                                                         ║
# ║      - web        : Nginx (Static file server)                      ║
# ║      - api        : FastAPI (YOLO Inference)                        ║
# ║      - npm        : Nginx Proxy Manager (Reverse Proxy + UI)        ║
# ║                                                                      ║
# ║    Flow: Internet → NPM:80 → fruit_web:80 (static)                 ║
# ║                            → fruit_api:8000 (POST /predict)        ║
# ║    Ports:                                                            ║
# ║      :80   → HTTP (NPM)                                             ║
# ║      :443  → HTTPS (NPM)                                            ║
# ║      :81   → NPM Admin UI                                           ║
# ╚════════════════════════════════════════════════════════════════════╝

services:
  # ┌──────────────────────────────────────────────────────────────────┐
  # │ SERVICE: web (Nginx static)                                      │
  # │ Purpose: Serve index.html + static assets                        │
  # │ Internal Port: 80 (via app-network เท่านั้น)                     │
  # │ NPM จะ forward มาที่ fruit_web:80                                │
  # └──────────────────────────────────────────────────────────────────┘
  web:
    image: nginx:1.25-alpine
    container_name: fruit_web
    restart: unless-stopped
    volumes:
      - ./web:/usr/share/nginx/html:ro
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  # ┌──────────────────────────────────────────────────────────────────┐
  # │ SERVICE: api (FastAPI + YOLO)                                    │
  # │ Purpose: Image classification inference                          │
  # │ Internal Port: 8000 (via app-network เท่านั้น)                   │
  # │ NPM จะ forward /predict มาที่ fruit_api:8000                     │
  # └──────────────────────────────────────────────────────────────────┘
  api:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: fruit_api
    restart: unless-stopped
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - UVICORN_LOG_LEVEL=info
    volumes:
      - ./ai:/app:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/docs" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ┌──────────────────────────────────────────────────────────────────┐
  # │ SERVICE: npm (Nginx Proxy Manager)                               │
  # │ Purpose: Reverse proxy + SSL + Web UI                            │
  # │ Admin UI : http://your-ip:81                                     │
  # └──────────────────────────────────────────────────────────────────┘
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: fruit_npm
    restart: unless-stopped
    ports:
      - "80:80" # HTTP
      - "443:443" # HTTPS
      - "81:81" # Admin UI
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:81" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

