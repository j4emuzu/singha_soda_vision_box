# ╔════════════════════════════════════════════════════════════════════╗
# ║    SINGHA SODA VISION BOX - Docker Compose Configuration            ║
# ║                                                                      ║
# ║    Services:                                                         ║
# ║      - web        : Nginx (Reverse Proxy + Static Server)           ║
# ║      - api        : FastAPI (YOLO Inference)                        ║
# ║                                                                      ║
# ║    Network: Internal Docker bridge network                          ║
# ║    Volumes: source code + model mounted                             ║
# ║    Ports: 8000:8000 (External)                                      ║
# ╚════════════════════════════════════════════════════════════════════╝

version: '3.8'

services:
  # ┌──────────────────────────────────────────────────────────────────┐
  # │ SERVICE: api (FastAPI + YOLO)                                    │
  # │ Purpose: Image classification inference                          │
  # │ Image: Built from ./ai/Dockerfile                                │
  # │ Internal Port: 8000 (exposed to web service only)                │
  # │ External: No direct port exposure (behind Nginx)                 │
  # └──────────────────────────────────────────────────────────────────┘
  api:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: fruit_api

    restart: unless-stopped

    working_dir: /app

    environment:
      - PYTHONUNBUFFERED=1
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - UVICORN_LOG_LEVEL=info

    volumes:
      - ./ai:/app:ro

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/docs" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - app-network

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ┌──────────────────────────────────────────────────────────────────┐
  # │ SERVICE: web (Nginx)                                             │
  # │ Purpose: Reverse proxy + Static file serving                     │
  # │ Image: Official Nginx (Alpine, lightweight)                      │
  # │ Exposed Port: 8000 (external)                                    │
  # │ Depends on: api service                                          │
  # └──────────────────────────────────────────────────────────────────┘
  web:
    image: nginx:1.25-alpine
    container_name: fruit_web

    restart: unless-stopped

    depends_on:
      api:
        condition: service_healthy

    volumes:
      - ./web/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web:/web:ro

    ports:
      - "8000:8000"

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/docs" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # เพิ่มจาก 40s → 120s

    networks:
      - app-network

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

# ┌──────────────────────────────────────────────────────────────────────┐
# │ NETWORKS: Internal Docker bridge network                             │
# └──────────────────────────────────────────────────────────────────────┘
networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

# ┌──────────────────────────────────────────────────────────────────────┐
# │ VOLUMES: (Optional) Uncomment if needed                              │
