version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./web/index.html:/usr/share/nginx/html/index.html
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - yolo-service

  yolo-service:
    build:
      context: .
      dockerfile: ai/Dockerfile
    container_name: yolo-service
    # runtime: nvidia  <-- Comment out by default for compatibility
    # deploy:          <-- Add this for modern Docker GPU support (Optional)
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    shm_size: '2gb'
    restart: always
