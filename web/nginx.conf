# ╔════════════════════════════════════════════════════════════════════╗
# ║           SINGHA SODA VISION BOX - Nginx Configuration              ║
# ║                                                                      ║
# ║  Role: Reverse Proxy + Static File Serving                          ║
# ║  Exposes: Port 8000 (externally)                                    ║
# ║  Routes:                                                             ║
# ║    /                  → Serve index.html (Static)                   ║
# ║    /api/predict       → FastAPI Backend (Port 8000 internal)        ║
# ╚════════════════════════════════════════════════════════════════════╝

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 32M;  # Allow large image uploads

    # ┌──────────────────────────────────────────────────────────────────┐
    # │ UPSTREAM: FastAPI Backend (YOLO Service)                         │
    # │ Internal Docker network communication                            │
    # └──────────────────────────────────────────────────────────────────┘
    upstream fastapi_backend {
        # 'api' is the service name in docker-compose.yml
        # Port 8000 is the internal port FastAPI listens on
        server api:8000;
    }

    # ┌──────────────────────────────────────────────────────────────────┐
    # │ MAIN SERVER BLOCK: Port 8000 (External)                          │
    # │ Serves both static files and proxies API requests                │
    # └──────────────────────────────────────────────────────────────────┘
    server {
        listen 8000;
        server_name _;

        # ─ Gzip compression for faster delivery
        gzip on;
        gzip_types text/plain text/css application/json application/javascript;
        gzip_min_length 1000;

        # ┌────────────────────────────────────────────────────────────┐
        # │ Static Files: index.html + Assets                          │
        # │ Location: /web (defined in docker-compose volume)          │
        # └────────────────────────────────────────────────────────────┘
        root /web;

        # Root path → Serve index.html
        location / {
            try_files $uri $uri/ /index.html;
            # Disable caching for index.html (always fresh)
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # ┌────────────────────────────────────────────────────────────┐
        # │ API Proxy: /api/* → FastAPI Backend                        │
        # │ Pattern: POST /api/predict → FastAPI /predict              │
        # └────────────────────────────────────────────────────────────┘
        location /api/ {
            # Remove '/api' prefix before forwarding to upstream
            rewrite ^/api/(.*) /$1 break;

            # Proxy settings
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;

            # Request headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # CORS headers (Optional: if frontend & backend differ)
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";

            # Timeouts for image processing
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;  # YOLO inference can take time

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ┌────────────────────────────────────────────────────────────┐
        # │ Health Check: GET /health (for docker/monitoring)          │
        # │ Returns 200 if nginx is running                            │
        # └────────────────────────────────────────────────────────────┘
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}